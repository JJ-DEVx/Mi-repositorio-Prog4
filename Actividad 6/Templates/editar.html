<h1>Editar libro</h1>

<a href="/">Volver</a>

<form method="post">
    <input name="titulo" value="{{ libro.titulo }}"><br><br>
    <input name="autor" value="{{ libro.autor }}"><br><br>
    <input name="genero" value="{{ libro.genero }}"><br><br>
    <input name="estado" value="{{ libro.estado }}"><br><br>

    <button type="submit">Actualizar</button>
</form>
