<!DOCTYPE html>
<html>
<head>
    <title>Editar Libro</title>
</head>
<body>

<h1>Editar Libro</h1>

<form method="POST">
    Título: <input type="text" name="titulo" value="{{ libro.titulo }}"><br>
    Autor: <input type="text" name="autor" value="{{ libro.autor }}"><br>
    Género: <input type="text" name="genero" value="{{ libro.genero }}"><br>
    Estado: <input type="text" name="estado" value="{{ libro.estado }}"><br><br>

    <button type="submit">Actualizar</button>
</form>

<a href="/">Volver</a>

</body>
</html>
