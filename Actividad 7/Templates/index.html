{% extends "base.html" %}

{% block contenido %}

<h2>Lista de libros</h2>

<table border="1">
<tr>
    <th>Título</th>
    <th>Autor</th>
    <th>Acciones</th>
</tr>

{% for libro in libros %}
<tr>
    <td>{{ libro.titulo }}</td>
    <td>{{ libro.autor }}</td>
    <td>
        <a href="/editar/{{ libro.id }}">Editar</a>
        <a href="/eliminar/{{ libro.id }}">Eliminar</a>
    </td>
</tr>
{% endfor %}

</table>

{% endblock %}
